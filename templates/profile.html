<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 48px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 16px;
        }
        h1 { font-size: 22px; margin-bottom: 8px; color: #111; }
        p { color: #666; margin-bottom: 32px; font-size: 15px; }
        a {
            background: #111;
            color: white;
            padding: 12px 32px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        a:hover { background: #333; }
    </style>
</head>
<body>
    <div class="card">
        {% if user.picture %}
            <img src="{{ user.picture }}" alt="Profile picture">
        {% endif %}
        <h1>{{ user.name }}</h1>
        <p>{{ user.email }}</p>
        <a href="/logout">Logout</a>
    </div>
</body>
</html>
